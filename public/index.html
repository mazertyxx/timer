<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Timer</title>

<style>
body {
  margin:0;
  background:transparent;
  overflow:hidden;
}

#timer {
  font-size:120px;
  color:white;
  text-align:center;
  font-family:Arial;
}

#bonus {
  font-size:40px;
  color:red;
  text-align:center;
  opacity:0;
}
</style>

</head>

<body>

<div id="timer">01:00</div>
<div id="bonus">+30 secondes</div>

<script>

// 👇 ICI TON CODE

let last = 0;

function format(t){
let m = Math.floor(t/60);
let s = t%60;
return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function render(time, bonusActive){

const timer = document.getElementById("timer");
const bonus = document.getElementById("bonus");

if(time <= 0){
timer.style.display = "none";
bonus.style.opacity = 0;
return;
}

timer.style.display = "block";
timer.textContent = format(time);

if(time < last && bonusActive){
timer.style.color = "red";
bonus.style.opacity = 1;

```
setTimeout(()=>{
  timer.style.color = "white";
  bonus.style.opacity = 0;
},800);
```

}

last = time;
}

async function loop(){
try {
const res = await fetch("/state");
const data = await res.json();

```
render(data.time, data.bonusActive);
```

} catch(e){
console.log("error", e);
}
}

setInterval(loop, 100); // ultra fluide


</script>

</body>
</html>
