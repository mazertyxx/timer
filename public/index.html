<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Timer</title>

<style>
body {
  margin:0;
  background:transparent;
  overflow:hidden;
}

#timer {
  font-size:120px;
  color:white;
  text-align:center;
  font-family:Arial;
}

#bonus {
  font-size:40px;
  color:red;
  text-align:center;
  opacity:0;
}
</style>

</head>

<body>

<div id="timer">01:00</div>
<div id="bonus">+30 secondes</div>

<script>

// 👇 ICI TON CODE

let lastTime = 0;

function format(t){
  let m = Math.floor(t/60);
  let s = t%60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

async function update(){
  const res = await fetch("/state");
  const data = await res.json();

  const timer = document.getElementById("timer");
  const bonus = document.getElementById("bonus");

  if(data.time <= 0 && !data.running){
    timer.style.display = "none";
    bonus.style.opacity = 0;
    return;
  }

  timer.style.display = "block";
  timer.textContent = format(data.time);

  if(data.bonusActive && data.time > lastTime){
    timer.style.color = "red";
    bonus.style.opacity = 1;
    bonus.innerText = "+30 secondes";

    setTimeout(()=>{
      timer.style.color = "white";
      bonus.style.opacity = 0;
    },1000);
  }

  lastTime = data.time;
}

setInterval(update,200);

</script>

</body>
</html>
