<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Timer</title>

<style>
body {
  margin:0;
  background:transparent;
  overflow:hidden;
}

#timer {
  font-size:120px;
  color:white;
  text-align:center;
  font-family:Arial, sans-serif;
}

#bonus {
  font-size:40px;
  color:red;
  text-align:center;
  opacity:0;
}
</style>

</head>

<body>

<div id="timer">01:00</div>
<div id="bonus">+30 secondes</div>

<script>

let displayTime = 0;

function format(t){
  let m = Math.floor(t/60);
  let s = t%60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

async function fetchState(){
  const res = await fetch("/state");
  const data = await res.json();

  if(!data.running && data.time === 0){
    document.getElementById("timer").style.display = "none";
    return;
  }

  document.getElementById("timer").style.display = "block";

  if(data.time > displayTime){
    document.getElementById("timer").style.color = "red";
    document.getElementById("bonus").style.opacity = 1;

    setTimeout(()=>{
      document.getElementById("timer").style.color = "white";
      document.getElementById("bonus").style.opacity = 0;
    },1000);
  }

  displayTime = data.time;
  document.getElementById("timer").textContent = format(data.time);
}

// refresh
setInterval(fetchState, 200);

</script>

</body>
</html>
